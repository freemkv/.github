name: Update README version

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version in README
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          sed -i "s|## Download.*|## Download — ${VERSION}|" profile/README.md
          sed -i "s|>\s*\*\*\[Download latest release\].*|> **[Download ${VERSION}](https://github.com/freemkv/freemkv/releases/tag/${VERSION})** — Linux x86_64 and aarch64 binaries.|" profile/README.md
          sed -i "s|freemkv-v[0-9]*\.[0-9]*\.[0-9]*|freemkv-${VERSION}|g" profile/README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --cached --quiet || git commit -m "Update to freemkv ${VERSION}"
          git push
